<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SimpleeStream</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      padding: 20px;
      margin: 0;
    }

    h1 {
      text-align: center;
    }

    #searchContainer {
      max-width: 600px;
      margin: auto;
      position: relative;
    }

    #searchInput {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
    }

    #suggestions {
      position: absolute;
      width: 100%;
      background: #222;
      border-radius: 6px;
      z-index: 10;
    }

    .suggestion {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .suggestion:hover {
      background: #333;
    }

    iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
      margin-top: 20px;
    }

    #seasonContainer, #episodesContainer, #similarContainer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      background: #222;
      color: white;
      padding: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      background: #444;
    }

    .btn.selected {
      background: #444;
    }

    select {
      padding: 10px;
      background: #222;
      color: #fff;
      border-radius: 6px;
      border: none;
      font-size: 16px;
    }

    #reportProblemBtn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 2147483647;
  display: block;
  background: #222;
  color: white;
  padding: 12px 18px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: bold;
  border: 1px solid #444;
}

#reportProblemBtn:hover {
  background: #333;
}

#disclaimer {
  background: #008000;
  color: white;
  padding: 12px;
  text-align: center;
  border-radius: 6px;
  margin-bottom: 20px;
  font-weight: bold;
}
  </style>
</head>

<body>

<div id="disclaimer">
  ✅ Video playback and streaming has been updated and should be working properly.
</div>

<h1>SimpleeStream</h1>

<div id="searchContainer">
  <input id="searchInput" type="text" placeholder="Search for a movie or TV show..." autocomplete="off" />
  <div id="suggestions"></div>
</div>

<iframe id="player" allowfullscreen></iframe>

<div id="seasonContainer" style="display:none;">
  <label for="seasonSelect">Season:</label>
  <select id="seasonSelect"></select>
</div>

<div id="episodesContainer"></div>
<div id="similarContainer"></div>
<a
  id="reportProblemBtn"
  href="https://docs.google.com/forms/d/e/1FAIpQLSfeujs0epQgn80vrJM5ZkH0fMoRDabe809LUx_7dPyNXWowhQ/viewform"
  target="_blank"
>
  ⚠️ Report a Problem
</a>

<script>
const apiKey = "b3aa6957";

const input = document.getElementById("searchInput");
const suggestions = document.getElementById("suggestions");
const player = document.getElementById("player");
const episodesContainer = document.getElementById("episodesContainer");
const seasonSelect = document.getElementById("seasonSelect");
const seasonContainer = document.getElementById("seasonContainer");
const similarContainer = document.getElementById("similarContainer");

let debounceTimer;
let currentTVShowID = null;
let currentEpisodeButton = null;

input.addEventListener("input", () => {
  const query = input.value.trim();
  clearTimeout(debounceTimer);

  if (!query) {
    suggestions.innerHTML = "";
    return;
  }

  debounceTimer = setTimeout(() => fetchSuggestions(query), 300);
});

async function fetchSuggestions(query) {
  const res = await fetch(`https://www.omdbapi.com/?apikey=${apiKey}&s=${encodeURIComponent(query)}`);
  const data = await res.json();

  suggestions.innerHTML = "";

  if (data.Response === "False" || !data.Search) {
    suggestions.innerHTML = "<div class='suggestion'>No results</div>";
    return;
  }

  data.Search.forEach(item => {
    const div = document.createElement("div");
    div.className = "suggestion";
    div.textContent = `${item.Title} (${item.Year})`;
    div.onclick = () => selectSuggestion(item);
    suggestions.appendChild(div);
  });
}

function selectSuggestion(item) {
  suggestions.innerHTML = "";
  input.value = `${item.Title} (${item.Year})`;

  player.src = "";
  episodesContainer.innerHTML = "";
  similarContainer.innerHTML = "";

  if (item.Type === "movie") {
    loadMovie(item.imdbID);
  } else if (item.Type === "series") {
    loadTVShow(item.imdbID);
  }
}

function loadMovie(imdbID) {
  seasonContainer.style.display = "none";
  episodesContainer.innerHTML = "";

  player.src =
    `https://vidsrc.ru/movie/${imdbID}` +
    `?autoplay=true` +
    `&colour=00ff9d` +
    `&pausescreen=true`;

  loadSimilar(imdbID);
}

async function loadTVShow(imdbID) {
  currentTVShowID = imdbID;

  seasonContainer.style.display = "block";
  episodesContainer.innerHTML = "";
  similarContainer.innerHTML = "";
  seasonSelect.innerHTML = "";

  const res = await fetch(`https://www.omdbapi.com/?apikey=${apiKey}&i=${imdbID}&type=series`);
  const data = await res.json();

  const totalSeasons = parseInt(data.totalSeasons || 0);

  for (let i = 1; i <= totalSeasons; i++) {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = `Season ${i}`;
    seasonSelect.appendChild(opt);
  }

  seasonSelect.onchange = () => loadEpisodes(imdbID, seasonSelect.value);

  if (totalSeasons > 0) {
    loadEpisodes(imdbID, 1);
  }
}

async function loadEpisodes(imdbID, season) {
  const res = await fetch(`https://www.omdbapi.com/?apikey=${apiKey}&i=${imdbID}&Season=${season}`);
  const data = await res.json();

  episodesContainer.innerHTML = "";
  currentEpisodeButton = null;

  if (!data.Episodes) return;

  player.src =
  `https://vidsrc.ru/tv/${imdbID}/${season}/1` +
  `?autoplay=true` +
  `&autonextepisode=true` +
  `&colour=00ff9d`;

  data.Episodes.forEach((ep, index) => {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.textContent = `Episode ${index + 1}`;

    btn.onclick = () => {
      player.src =
  `https://vidsrc.ru/tv/${imdbID}/${season}/${index + 1}` +
  `?autoplay=true` +
  `&autonextepisode=true` +
  `&colour=00ff9d`;

let currentEpisodeButton = null;

const STORAGE_KEY = "watch_progress";
let watchProgress = JSON.parse(
  localStorage.getItem(STORAGE_KEY) || "{}"
);

window.addEventListener("message", (event) => {
  if (event.data?.type === "MEDIA_DATA") {
    const mediaData = event.data.data;

    if (
      mediaData.id &&
      (mediaData.type === "movie" || mediaData.type === "tv")
    ) {
      watchProgress[mediaData.id] = {
        ...watchProgress[mediaData.id],
        ...mediaData,
        last_updated: Date.now()
      };

      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(watchProgress)
      );
    }
  }
});

      if (currentEpisodeButton) {
        currentEpisodeButton.classList.remove("selected");
      }

      btn.classList.add("selected");
      currentEpisodeButton = btn;
    };

    if (index === 0) {
      btn.classList.add("selected");
      currentEpisodeButton = btn;
    }

    episodesContainer.appendChild(btn);
  });
}

async function loadSimilar(imdbID) {
  similarContainer.innerHTML = "";

  const res = await fetch(`https://www.omdbapi.com/?apikey=${apiKey}&s=movie`);
  const data = await res.json();

  if (!data.Search) return;

  data.Search.slice(0, 4).forEach(item => {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.textContent = item.Title;

    btn.onclick = () => {
      input.value = item.Title;
      selectSuggestion(item);
    };

    similarContainer.appendChild(btn);
  });
}
</script>
</html>
